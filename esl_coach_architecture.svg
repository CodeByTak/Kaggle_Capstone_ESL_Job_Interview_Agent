<svg width="800" height="640" viewBox="0 0 800 640" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="800" height="640" fill="#ffffff"/>

  <text x="400" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a2e">
    ESL Interview Coach — System Architecture
  </text>

  <!-- Learner message -->
  <rect x="290" y="55" width="220" height="46" rx="8" fill="#f2f2f7" stroke="#888"/>
  <text x="400" y="83" text-anchor="middle" font-size="14" fill="#1a1a2e">Learner message</text>
  <line x1="400" y1="101" x2="400" y2="130" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Guardrail -->
  <rect x="255" y="132" width="290" height="56" rx="8" fill="#fde8e8" stroke="#c0392b"/>
  <text x="400" y="153" text-anchor="middle" font-size="14" font-weight="700" fill="#7a1f1a">Safety Guardrail</text>
  <text x="400" y="173" text-anchor="middle" font-size="12" fill="#7a1f1a">before_model_callback — breakout detection</text>
  <line x1="400" y1="188" x2="400" y2="216" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Root orchestrator -->
  <rect x="240" y="218" width="320" height="56" rx="8" fill="#ece5fb" stroke="#6c3fc5"/>
  <text x="400" y="239" text-anchor="middle" font-size="14" font-weight="700" fill="#3f2170">Root Orchestrator (ADK LlmAgent)</text>
  <text x="400" y="259" text-anchor="middle" font-size="12" fill="#3f2170">Routes by intent: practice vs. feedback</text>

  <!-- branches -->
  <line x1="330" y1="274" x2="180" y2="314" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="470" y1="274" x2="620" y2="314" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- InterviewCoach -->
  <rect x="50" y="316" width="260" height="70" rx="8" fill="#ece5fb" stroke="#6c3fc5"/>
  <text x="180" y="340" text-anchor="middle" font-size="14" font-weight="700" fill="#3f2170">InterviewCoach</text>
  <text x="180" y="359" text-anchor="middle" font-size="12" fill="#3f2170">Stays in character,</text>
  <text x="180" y="375" text-anchor="middle" font-size="12" fill="#3f2170">asks interview questions</text>

  <!-- ProgressCoach -->
  <rect x="490" y="316" width="260" height="70" rx="8" fill="#ece5fb" stroke="#6c3fc5"/>
  <text x="620" y="340" text-anchor="middle" font-size="14" font-weight="700" fill="#3f2170">ProgressCoach</text>
  <text x="620" y="359" text-anchor="middle" font-size="12" fill="#3f2170">Delivers grouped,</text>
  <text x="620" y="375" text-anchor="middle" font-size="12" fill="#3f2170">encouraging feedback</text>

  <!-- lines down to MCP server -->
  <line x1="180" y1="386" x2="330" y2="440" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="620" y1="386" x2="470" y2="440" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- MCP server -->
  <rect x="230" y="442" width="340" height="80" rx="8" fill="#e2f6f3" stroke="#1f9c85"/>
  <text x="400" y="466" text-anchor="middle" font-size="14" font-weight="700" fill="#0d5c4d">MCP Server (interview_mcp_server.py)</text>
  <text x="400" y="486" text-anchor="middle" font-size="12" fill="#0d5c4d">Tools: log_error · get_error_summary</text>
  <text x="400" y="503" text-anchor="middle" font-size="12" fill="#0d5c4d">Connected via ADK MCPToolset (stdio)</text>

  <!-- MCP protocol label on connecting lines -->
  <text x="215" y="418" font-size="11" fill="#0d5c4d" font-style="italic">MCP protocol</text>
  <text x="565" y="418" font-size="11" fill="#0d5c4d" font-style="italic">MCP protocol</text>

  <!-- legend -->
  <rect x="40" y="550" width="720" height="70" rx="8" fill="#fafafa" stroke="#ddd"/>
  <text x="60" y="572" font-size="13" font-weight="700" fill="#333">Concepts demonstrated:</text>
  <text x="60" y="592" font-size="12" fill="#333">1. Multi-agent system (ADK) — root orchestrator delegates to two sub-agents</text>
  <text x="60" y="608" font-size="12" fill="#333">2. MCP Server — tool logic runs in a standalone process, connected over MCP  ·  3. Security guardrail — breakout detection before every model call</text>
</svg>
